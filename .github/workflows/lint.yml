name: Lint

on:
  push:
    branches: [ 'main' ]
  pull_request:
    branches: [ 'main' ]

jobs:
  lint-format:
    name: Prettier
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Install
        run: npm ci

      - name: Prettier
        run: npm run format:check

  lint:
    name: ESLint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Install
        run: npm ci

      - name: ESLint
        run: npm run lint

  lint-ui:
    name: Blueprint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3

      # Ubuntu's repos are always outdated.
      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@v22

      - name: Blueprint lint
        run: |
          set +e
          output="$(nix develop . -c npm run lint:ui 2>&1)"
          status=$?
          set -e

          printf '%s\n' "$output"
          clean="$(printf '%s\n' "$output" | sed -E 's/\x1b\[[0-9;]*m//g')"

          if printf '%s\n' "$clean" | grep -q '^error:'; then
            echo "::error::Blueprint lint reported errors"
            exit 1
          elif printf '%s\n' "$clean" | grep -q '^warning:'; then
            echo "::warning::Blueprint lint reported warnings"
            exit 0
          else
            exit $status
          fi
